name: Quality

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  quality:
    name: ${{ matrix.os }} / Python 3.12
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Run lint
        run: uv run ruff check --output-format=github .

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Run type checks
        run: uv run ty check --output-format=github app tests

      - name: Run tests with coverage
        # Threshold set low for skeleton phase; increase to 80 after Phase 4
        run: uv run pytest --cov=app --cov-fail-under=50
