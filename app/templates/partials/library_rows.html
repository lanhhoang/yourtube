{% for row in rows %}
<article class="library-entry" data-job-id="{{ row.id }}">
  <div class="library-entry-main">
    <h2>{{ row.title or row.url }}</h2>
    <p>{{ row.uploader or "Unknown uploader" }}</p>
  </div>
  <div class="library-entry-actions">
    <a href="/downloads/{{ row.id }}/file">Download file</a>
    <button
      type="button"
      hx-delete="/library/delete/{{ row.id }}?q={{ query | urlencode }}"
      hx-target="#library-rows"
      hx-swap="innerHTML"
    >
      Delete
    </button>
  </div>
</article>
{% else %}
<article class="empty-state">
  <h2>No completed downloads yet.</h2>
</article>
{% endfor %}
